name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      # Hamein deploy karne se pehle ensure karna hai ke koi purana cache na ho
      - name: Clean Previous Builds
        run: flutter clean

      - name: Build Flutter Web
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      # Bina kisi risky deletion k simply .nojekyll generate karein
      - name: Add .nojekyll
        run: touch build/web/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: build/web
          clean: true # Yeh automatically deploy ke waqt gh-pages branch ko sahi se sync karega