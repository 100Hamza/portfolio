<!DOCTYPE html>
<html lang="en">

<head>
  <base href="/portfolio/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description"
    content="Premium Flutter Developer | Crafting high-performance, production-ready applications for Android, iOS, and Web.">

  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="Muhammad Hamza | Elite Flutter Portfolio">
  <meta property="og:description"
    content="Professional Flutter Developer specializing in premium, production-ready Android/iOS applications.">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta property="og:type" content="website">

  <!-- Web App & Icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hamza Dev">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="manifest" href="manifest.json">

  <title>Muhammad Hamza | Flutter Alchemist</title>

  <!-- Google Fonts: Poppins + Space Grotesk for modern tech vibe -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      /* subtle premium feel */
    }

    body {
      background: radial-gradient(ellipse at 30% 40%, #0a0f2a, #020617);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Space Grotesk', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* ---- DYNAMIC CANVAS BACKGROUND (cosmic particles + interactive glow) ---- */
    #cosmicCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 0;
      pointer-events: none;
      opacity: 0.7;
    }

    /* main splash container - glass morphic with depth */
    .splash-nexus {
      position: relative;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      backdrop-filter: blur(2px);
      animation: fadeContainer 1s ease-out;
      will-change: transform, opacity;
    }

    /* ORBIT RINGS (kinetic energy) */
    .orbit-ring {
      position: absolute;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      animation: ringAppear 1.2s ease-out forwards;
    }

    .ring-1 {
      width: 280px;
      height: 280px;
      border: 1.5px solid rgba(1, 117, 194, 0.3);
      border-top-color: rgba(1, 180, 255, 0.9);
      border-radius: 50%;
      animation: spinReverse 14s infinite linear, ringAppear 1s 0.2s forwards;
      filter: drop-shadow(0 0 6px rgba(0, 191, 255, 0.6));
    }

    .ring-2 {
      width: 380px;
      height: 380px;
      border: 1px dashed rgba(0, 180, 255, 0.5);
      border-radius: 50%;
      animation: spin 20s infinite linear;
      animation-delay: 0.5s;
    }

    .ring-3 {
      width: 460px;
      height: 460px;
      border: 0.8px dotted rgba(100, 181, 246, 0.4);
      border-radius: 50%;
      animation: spinReverse 25s infinite linear;
    }

    .pulse-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      background: #42a5f5;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 20px 6px #0288d1;
      animation: corePulse 2.2s infinite alternate;
    }

    /* HAMZA premium text with 3D layering */
    .logo-master {
      font-size: 5.6rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #FFFFFF, #64B5F6, #1E88E5, #0D47A1);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: textGradientFlow 6s ease infinite, levitate 3s ease-in-out infinite;
      text-shadow: 0 0 15px rgba(30, 136, 229, 0.4);
      margin-bottom: 0.2rem;
      position: relative;
    }

    .sub-brand {
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #b3e5fc;
      background: linear-gradient(120deg, #cdedff, #82b1ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 2.2rem;
      opacity: 0;
      animation: fadeUpWord 1.2s 0.8s forwards;
    }

    /* MODERN LOADING METRIC CARD */
    .loading-odyssey {
      background: rgba(8, 20, 48, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 0.8rem 2rem;
      width: 400px;
      max-width: 85vw;
      border: 1px solid rgba(30, 136, 229, 0.4);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: all 0.3s;
    }

    .progress-area {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .status-message {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      color: #bbdef5;
      font-family: 'Space Grotesk', monospace;
    }

    .status-text {
      text-transform: uppercase;
      background: linear-gradient(90deg, #90caf9, #e3f2fd);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 600;
    }

    .percentage-value {
      font-weight: 700;
      color: #64ffda;
      text-shadow: 0 0 5px #00bcd4;
    }

    .glass-bar {
      width: 100%;
      height: 8px;
      background: rgba(10, 25, 55, 0.8);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 1px 2px #00000030;
    }

    .fill-progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00c6ff, #0072ff, #2a6fdb);
      border-radius: 20px;
      box-shadow: 0 0 12px #00a6ff;
      transition: width 0.15s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      position: relative;
      overflow: hidden;
    }

    .fill-progress::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0));
      animation: shimmer 1.2s infinite;
    }

    .loading-footnote {
      margin-top: 1.8rem;
      font-size: 0.7rem;
      font-weight: 400;
      color: #7e9bc0;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .dot-pulse {
      width: 8px;
      height: 8px;
      background: #42a5f5;
      border-radius: 50%;
      display: inline-block;
      animation: blinkDot 1.4s infinite;
    }

    /* ANIMATIONS */
    @keyframes textGradientFlow {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes levitate {
      0% {
        transform: translateY(0px);
      }

      100% {
        transform: translateY(-6px);
      }
    }

    @keyframes spin {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }

      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    @keyframes spinReverse {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }

      to {
        transform: translate(-50%, -50%) rotate(-360deg);
      }
    }

    @keyframes ringAppear {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.6);
      }

      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes corePulse {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.7;
        box-shadow: 0 0 10px #00a6ff;
      }

      100% {
        transform: translate(-50%, -50%) scale(1.6);
        opacity: 1;
        box-shadow: 0 0 35px #2e7af5;
      }
    }

    @keyframes fadeUpWord {
      0% {
        opacity: 0;
        transform: translateY(12px);
        letter-spacing: 8px;
      }

      100% {
        opacity: 1;
        transform: translateY(0);
        letter-spacing: 6px;
      }
    }

    @keyframes fadeContainer {
      0% {
        opacity: 0;
        transform: scale(0.96);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(200%);
      }
    }

    @keyframes blinkDot {

      0%,
      100% {
        opacity: 0.3;
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        transform: scale(1.2);
        background: #64ffda;
      }
    }

    /* responsiveness */
    @media (max-width: 550px) {
      .logo-master {
        font-size: 3.2rem;
        letter-spacing: 4px;
      }

      .sub-brand {
        font-size: 0.7rem;
        letter-spacing: 3px;
      }

      .loading-odyssey {
        width: 320px;
        padding: 0.6rem 1.2rem;
      }

      .status-message {
        font-size: 0.65rem;
      }
    }

    /* Remove splash blur & hide after transition */
    .splash-hidden {
      opacity: 0 !important;
      visibility: hidden !important;
      transition: opacity 0.9s cubic-bezier(0.23, 1, 0.32, 1), visibility 0s 0.9s;
      filter: blur(12px);
      pointer-events: none;
    }
  </style>
</head>

<body>

  <!-- dynamic particle canvas (interactive cosmic dust) -->
  <canvas id="cosmicCanvas"></canvas>

  <!-- Main Splash Nexus -->
  <div id="splashScreen" class="splash-nexus">
    <!-- Orbital rings -->
    <div class="orbit-ring ring-1"></div>
    <div class="orbit-ring ring-2"></div>
    <div class="orbit-ring ring-3"></div>
    <div class="pulse-dot"></div>

    <!-- Hero Identity -->
    <div class="logo-master">HAMZA</div>
    <div class="sub-brand">FLUTTER ARTISAN</div>

    <!-- Advanced Loading Card -->
    <div class="loading-odyssey">
      <div class="progress-area">
        <div class="status-message">
          <span class="status-text" id="loadingStatusText">INITIALIZING CORE</span>
          <span class="percentage-value" id="progressPercent">0%</span>
        </div>
        <div class="glass-bar">
          <div class="fill-progress" id="progressFillBar"></div>
        </div>
      </div>
    </div>
    <div class="loading-footnote">
      <span class="dot-pulse"></span>
      <span style="font-weight: 300;">premium production environment</span>
      <span class="dot-pulse"></span>
    </div>
  </div>

  <!-- Flutter bootstrap integration (async) -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    (function () {
      // ----------------------------------------------
      // 1. INTERACTIVE CANVAS BACKGROUND (particle starfield + wave)
      // ----------------------------------------------
      const canvas = document.getElementById('cosmicCanvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      let mouseX = 0, mouseY = 0;
      let canvasWidth, canvasHeight;

      function resizeCanvas() {
        canvasWidth = window.innerWidth;
        canvasHeight = window.innerHeight;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
      }

      class Particle {
        constructor() {
          this.x = Math.random() * canvasWidth;
          this.y = Math.random() * canvasHeight;
          this.size = Math.random() * 2.2 + 0.8;
          this.speedX = (Math.random() - 0.5) * 0.4;
          this.speedY = (Math.random() - 0.5) * 0.3;
          this.opacity = Math.random() * 0.5 + 0.2;
          this.glow = Math.random() * 0.6;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < -20) this.x = canvasWidth + 20;
          if (this.x > canvasWidth + 20) this.x = -20;
          if (this.y < -20) this.y = canvasHeight + 20;
          if (this.y > canvasHeight + 20) this.y = -20;

          // subtle mouse interaction - particles drift away from cursor area
          if (mouseX && mouseY) {
            let dx = this.x - mouseX;
            let dy = this.y - mouseY;
            let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 100) {
              let angle = Math.atan2(dy, dx);
              let force = (100 - dist) / 800;
              this.x += Math.cos(angle) * force * 1.2;
              this.y += Math.sin(angle) * force * 1.2;
            }
          }
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(100, 180, 255, ${this.opacity * 0.7})`;
          ctx.fill();
          if (this.size > 1.3) {
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#3b82f6';
            ctx.fill();
            ctx.shadowBlur = 0;
          }
        }
      }

      function initParticles() {
        particles = [];
        let particleCount = Math.min(140, Math.floor(window.innerWidth / 12));
        for (let i = 0; i < particleCount; i++) {
          particles.push(new Particle());
        }
      }

      function animateParticles() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        ctx.fillStyle = 'rgba(2, 6, 23, 0.12)';
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        for (let p of particles) {
          p.update();
          p.draw();
        }
        // draw faint connecting lines (tech web)
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(60, 130, 210, 0.12)';
        ctx.lineWidth = 0.6;
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            let dx = particles[i].x - particles[j].x;
            let dy = particles[i].y - particles[j].y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 110) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(animateParticles);
      }

      window.addEventListener('resize', () => {
        resizeCanvas();
        initParticles();
      });
      window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        setTimeout(() => { mouseX = null; mouseY = null; }, 200);
      });
      resizeCanvas();
      initParticles();
      animateParticles();

      // ----------------------------------------------
      // 2. SOPHISTICATED PROGRESS SIMULATION + FLUTTER SPLASH REMOVAL
      // ----------------------------------------------
      const splashElement = document.getElementById('splashScreen');
      const progressFill = document.getElementById('progressFillBar');
      const percentSpan = document.getElementById('progressPercent');
      const statusSpan = document.getElementById('loadingStatusText');

      // dynamic loading stages — reflects premium Flutter dev workflow
      const stages = [
        { text: "ANALYZING DEPENDENCIES", progressCap: 18 },
        { text: "COMPILING WIDGETS", progressCap: 34 },
        { text: "SYNCHRONIZING STATE", progressCap: 52 },
        { text: "OPTIMIZING PERFORMANCE", progressCap: 73 },
        { text: "LOADING UX FRAMEWORK", progressCap: 88 },
        { text: "READY FOR DEPLOYMENT", progressCap: 100 }
      ];

      let currentProgress = 0;
      let stageIndex = 0;
      let intervalId = null;

      function updateUI() {
        // update progress bar width
        if (progressFill) progressFill.style.width = currentProgress + '%';
        if (percentSpan) percentSpan.innerText = Math.floor(currentProgress) + '%';

        // update status message based on current progress thresholds
        for (let i = stages.length - 1; i >= 0; i--) {
          if (currentProgress >= stages[i].progressCap) {
            if (statusSpan.innerText !== stages[i].text) {
              statusSpan.innerText = stages[i].text;
              // micro animation: subtle flicker
              statusSpan.style.opacity = '0.7';
              setTimeout(() => { if (statusSpan) statusSpan.style.opacity = '1'; }, 120);
            }
            break;
          }
        }

        // once 100% reached -> finish and remove splash gracefully
        if (currentProgress >= 100) {
          if (intervalId) clearInterval(intervalId);
          intervalId = null;
          // final completion elegance
          setTimeout(() => {
            if (splashElement && !splashElement.classList.contains('splash-hidden')) {
              splashElement.classList.add('splash-hidden');
              // complete removal from DOM after transition ends
              setTimeout(() => {
                if (splashElement && splashElement.parentNode) splashElement.remove();
              }, 1000);
            }
          }, 400);
        }
      }

      function startProgressSimulation() {
        if (intervalId) return;
        intervalId = setInterval(() => {
          if (currentProgress < 100) {
            // Dynamic increment: smooth but realistic speed.
            let increment = 0;
            if (currentProgress < 30) increment = Math.random() * 1.2 + 0.7;
            else if (currentProgress < 70) increment = Math.random() * 1 + 0.5;
            else increment = Math.random() * 0.7 + 0.3;
            currentProgress = Math.min(currentProgress + increment, 100);
            updateUI();
          } else {
            if (intervalId) clearInterval(intervalId);
            intervalId = null;
          }
        }, 45);
      }

      // start loading progress on page load
      window.addEventListener('load', () => {
        startProgressSimulation();
      });

      // In case the flutter framework loads EXTREMELY fast, we still ensure splash removal.
      // additional fail-safe: if the Flutter root appears or bootstrap loaded, we monitor but progress simulation handles.
      // also handle potential early trigger by removing splash if flutter renders, but to avoid conflict,
      // we allow natural progression to 100% for consistent premium UX.

      // premium touch: add effect to HAMZA logo (magnetic glint)
      const logo = document.querySelector('.logo-master');
      if (logo) {
        logo.addEventListener('mouseenter', () => {
          logo.style.animation = 'none';
          logo.style.transform = 'scale(1.02)';
          logo.style.transition = 'all 0.2s cubic-bezier(0.2, 1.2, 0.8, 1)';
          setTimeout(() => {
            logo.style.animation = 'textGradientFlow 6s ease infinite, levitate 3s ease-in-out infinite';
            logo.style.transform = '';
          }, 300);
        });
      }

      // optional extra: manual removal if Flutter ready event (custom event detection)
      // some flutter apps dispatch 'flutter-first-frame' but it's optional.
      // we use a mutation observer or listen but not critical. just extra elegance:
      document.addEventListener('flutter-initialized', function () {
        // if Flutter is ready before progress 100%, accelerate the progress
        if (currentProgress < 90) {
          let accelerate = setInterval(() => {
            if (currentProgress < 95) {
              currentProgress = Math.min(currentProgress + 4.5, 98);
              updateUI();
            } else {
              clearInterval(accelerate);
              if (currentProgress < 100) {
                currentProgress = 100;
                updateUI();
              }
            }
          }, 35);
        }
      });

      // fallback: if flutter_bootstrap fails or takes too long but ensures splash goes away after max 9 seconds anyway
      setTimeout(() => {
        if (splashElement && !splashElement.classList.contains('splash-hidden') && currentProgress < 100) {
          // force completion if something stuck for ultra rare cases
          if (currentProgress < 100) {
            currentProgress = 100;
            updateUI();
          }
        }
      }, 9800);

      // ADD dynamic resize safeguard and progressive web app shine
      function dynamicGlow() {
        const rings = document.querySelectorAll('.orbit-ring');
        rings.forEach((ring, idx) => {
          ring.style.animationDelay = `${idx * 0.2}s`;
        });
      }
      dynamicGlow();

      // ---------- subtle floating status richness (optional per tick)
      let extraMessages = ["crafting widgets", "assembling particles", "ready for innovation"];
      let msgIdx = 0;
      setInterval(() => {
        if (currentProgress < 95 && splashElement && !splashElement.classList.contains('splash-hidden')) {
          let footnoteSpan = document.querySelector('.loading-footnote span:first-of-type');
          if (footnoteSpan && Math.random() > 0.6) {
            // just a little playful micro detail without overwhelming
          }
        }
      }, 5000);
    })();
  </script>
  <style>
    /* ensure smooth overlay for flutter app */
    body>*:not(canvas):not(.splash-nexus) {
      position: relative;
      z-index: 25;
    }

    .splash-hidden {
      display: none;
    }

    .fill-progress {
      transition: width 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
  </style>
</body>

</html>
